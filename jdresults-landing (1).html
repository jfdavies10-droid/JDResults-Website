<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDResults – Is Your Business Invisible on Google?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #ede9e3;
      --black: #111111;
      --grey: #888888;
      --red: #e02020;
      --border: #d4cfc8;
    }

    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--black);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.3px;
      color: var(--black);
    }

    .nav-btn {
      background: var(--black);
      color: #fff;
      border: none;
      padding: 11px 24px;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .nav-btn:hover { opacity: 0.82; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 0 0;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 48px;
      padding: 90px 60px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-left {
      flex: 1;
      max-width: 520px;
    }

    .hero-heading {
      font-family: 'Fraunces', serif;
      font-weight: 800;
      font-size: 52px;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--black);
      margin-bottom: 22px;
    }

    .hero-sub {
      font-size: 17px;
      color: var(--grey);
      line-height: 1.6;
      margin-bottom: 22px;
      font-weight: 400;
    }

    .hero-cta-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--black);
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .subscribe-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .email-input {
      flex: 1;
      max-width: 240px;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--grey);
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input:focus { border-color: var(--black); color: var(--black); }
    .email-input::placeholder { color: #bbb; }

    .subscribe-btn {
      background: var(--black);
      color: #fff;
      border: none;
      padding: 13px 24px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .subscribe-btn:hover { opacity: 0.82; }

    /* ── VIDEO CARD ── */
    .hero-right {
      flex: 1;
      max-width: 500px;
    }

    .video-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      aspect-ratio: 16/10;
      cursor: pointer;
      box-shadow: 0 8px 48px rgba(0,0,0,0.14);
      background: #1a2a3a;
    }

    /* Gradient overlay background (simulating a thumbnail) */
    .video-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a3a5c 0%, #2d1a2e 40%, #6b1a1a 100%);
    }

    /* Simulated podcast setup silhouette */
    .video-scene {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 50% 110%, rgba(180,60,60,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 30% 80%, rgba(40,80,140,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 70% 90%, rgba(100,30,80,0.3) 0%, transparent 70%);
    }

    /* Mic silhouette */
    .mic-svg {
      position: absolute;
      bottom: 40px;
      right: 60px;
      opacity: 0.45;
    }

    .click-label {
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      letter-spacing: 0.5px;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(220,30,30,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .video-card:hover .play-btn {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 6px 32px rgba(220,30,30,0.65);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 22px solid #fff;
      margin-left: 4px;
    }

    .local-badge {
      position: absolute;
      bottom: 48px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: rgba(255,255,255,0.18);
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* Sound icon */
    .sound-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 34px;
      height: 34px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Progress bar */
    .progress-bar-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timestamp {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .progress-track {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 99px;
      position: relative;
    }

    .progress-fill {
      width: 28%;
      height: 100%;
      background: var(--red);
      border-radius: 99px;
    }

    .progress-dot {
      position: absolute;
      top: 50%;
      left: 28%;
      transform: translate(-50%, -50%);
      width: 9px;
      height: 9px;
      background: var(--red);
      border-radius: 50%;
    }

    .brand-logo {
      margin-left: auto;
    }

    /* ── CLIENT LOGOS ── */
    .clients {
      padding: 40px 60px 60px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .clients-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--grey);
      font-weight: 500;
      white-space: nowrap;
    }

    .clients-logos {
      display: flex;
      align-items: center;
      gap: 36px;
      flex-wrap: wrap;
    }

    .client-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--grey);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      white-space: nowrap;
      opacity: 0.7;
    }

    /* Responsive */
    @media (max-width: 860px) {
      nav { padding: 18px 24px; }
      .hero { flex-direction: column; padding: 48px 24px 40px; }
      .hero-left, .hero-right { max-width: 100%; }
      .hero-heading { font-size: 38px; }
      .clients { padding: 20px 24px 40px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="#">
      <!-- JDResults logo SVG (magnifying glass with chart tick) -->
      <svg class="logo-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="52" cy="52" r="40" stroke="#111" stroke-width="10"/>
        <line x1="82" y1="82" x2="112" y2="112" stroke="#111" stroke-width="10" stroke-linecap="round"/>
        <polyline points="32,58 44,44 56,54 70,36" stroke="#111" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="logo-text">JDResults</span>
    </a>
    <button class="nav-btn">Sign Up</button>
  </nav>
  <hr class="divider" />

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <h1 class="hero-heading">Is Your Business Invisible on Google?</h1>
      <p class="hero-sub">Watch this short video to learn why you're not ranking in the top 3.</p>
      <p class="hero-cta-text">Sign up below to get three FREE tips you can implement today to start climbing ⬇️</p>
      <div class="subscribe-row">
        <input class="email-input" type="email" placeholder="name@email.com" />
        <button class="subscribe-btn">Subscribe</button>
      </div>
    </div>

    <div class="hero-right">
      <div class="video-card">
        <div class="video-bg"></div>
        <div class="video-scene"></div>

        <!-- Mic silhouette SVG -->
        <svg class="mic-svg" width="90" height="160" viewBox="0 0 90 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="28" y="0" width="34" height="80" rx="17" fill="white"/>
          <path d="M10 70 Q10 110 45 110 Q80 110 80 70" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
          <line x1="45" y1="110" x2="45" y2="140" stroke="white" stroke-width="6" stroke-linecap="round"/>
          <line x1="25" y1="140" x2="65" y2="140" stroke="white" stroke-width="6" stroke-linecap="round"/>
        </svg>

        <div class="click-label">Click To Watch</div>

        <!-- Sound icon -->
        <div class="sound-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </div>

        <div class="local-badge">Local</div>

        <!-- Play button -->
        <div class="play-btn">
          <div class="play-icon"></div>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-wrap">
          <span class="timestamp">2:44 ◀</span>
          <div class="progress-track">
            <div class="progress-fill"></div>
            <div class="progress-dot"></div>
          </div>
          <!-- Small brand mark -->
          <svg class="brand-logo" width="20" height="20" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="52" cy="52" r="40" stroke="white" stroke-width="10"/>
            <line x1="82" y1="82" x2="112" y2="112" stroke="white" stroke-width="10" stroke-linecap="round"/>
            <polyline points="32,58 44,44 56,54 70,36" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
      </div>
    </div>
  </section>



</body>
</html>
